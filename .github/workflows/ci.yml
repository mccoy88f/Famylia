name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  analyze-server:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@v4
      - uses: dart-lang/setup-dart@v1
        with:
          sdk: stable
      - name: Pub get
        run: dart pub get
      - name: Verifica presenza codice generato
        run: |
          if [ ! -f lib/src/generated/protocol.dart ]; then
            echo "::warning::Eseguire 'serverpod generate' prima del merge (lib/src/generated/ mancante)"
            exit 0
          fi
      - name: Analyze
        run: dart analyze --fatal-infos
        continue-on-error: true

  analyze-app:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - name: Pub get
        run: flutter pub get
      - name: Analyze
        run: flutter analyze
        continue-on-error: true
