  #     SERVERPOD_DATABASE_USER: famylia
  #     SERVERPOD_DATABASE_PASSWORD: ${DB_PASSWORD}
  #     SERVERPOD_REDIS_HOST: redis
  #   depends_on:
  #     postgres:
  #       condition: service_healthy
  #     redis:
  #       condition: service_healthy

volumes:
  postgres_data:
  redis_data:
  minio_data:
