# Stack completo Famylia — Fase 0
# Uso: cp .env.example .env && docker compose up -d

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: famylia
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme_famylia_db}
      POSTGRES_DB: famylia
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U famylia -d famylia"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: ${MINIO_USER:-famylia}
      MINIO_ROOT_PASSWORD: ${MINIO_PASSWORD:-changeme_minio}
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

  # Serverpod — decommentare dopo build Dockerfile server (Fase 0+)
  # server:
  #   build:
  #     context: ../server
  #     dockerfile: Dockerfile
  #   ports:
  #     - "8080:8080"
  #     - "8081:8081"
