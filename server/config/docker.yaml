# Serverpod in Docker (runmode: docker)
apiServer:
  port: 8080
  publicHost: localhost
  publicPort: 8080
  publicScheme: http

insightsServer:
  port: 8081
  publicHost: localhost
  publicPort: 8081
  publicScheme: http

webServer:
  port: 8082
  publicHost: localhost
  publicPort: 8082
  publicScheme: http

database:
  host: postgres
  port: 5432
  name: famylia
  user: famylia

redis:
  enabled: true
  host: redis
  port: 6379
