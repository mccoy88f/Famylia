### Compito familiare.
class: TodoItem
table: todo_item
fields:
  familyId: int, relation(parent=family)
  createdBy: int
  title: String
  description: String?
  category: TodoCategory, default=other
  priority: TodoPriority, default=medium
  status: TodoStatus, default=pending
  assignedTo: int?
  dueDate: DateTime?
  points: int, default=10
  completedAt: DateTime?
  completedBy: int?
indexes:
  todo_item_family_status_idx:
    fields: familyId, status
  todo_item_family_assigned_idx:
    fields: familyId, assignedTo
